<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body {
    background-color: rgb(37, 37, 37);
    font-family: Arial, sans-serif;
    text-align: center;
}

.container {
    margin-top: 100px;
    background: white;
    padding: 30px;
    width: 300px;
    margin-left: auto;
    margin-right: auto;
    border-radius: 10px;
}

input {
    margin: 10px;
    padding: 8px;
    width: 90%;
}
</style>

<script>
function check(form) {
    if(form.userid.value === "admin" &&
       form.pswrd.value === "password") {
        window.open("https://www.google.com", "_blank");
    } else {
        alert("Error: Incorrect Username or Password");
    }
}
</script>

</head>

<body>

<div class="container">
    <h2>Validate Credentials</h2>

    <form name="login">
        <input type="text" name="userid" placeholder="Username"><br>
        <input type="password" name="pswrd" placeholder="Password"><br>
        <input type="button" value="Login" onclick="check(this.form)">
        <input type="reset" value="Cancel">
    </form>
</div>

</body>
</html>
