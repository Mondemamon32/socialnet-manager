<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drill B2</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet"
integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
crossorigin="anonymous">

</head>
<body>

<div class="container mt-4">

<p class="text-start">This paragraph is aligned left.</p>
<p class="text-center">This paragraph is centered.</p>
<p class="text-end">This paragraph is aligned right.</p>

<hr class="my-3">

<h2 class="text-center text-md-start">
Responsive: Center on mobile, Left on tablet+
</h2>

<hr class="my-3">

<p class="fw-bold">fw-bold</p>
<p class="fw-light">fw-light</p>

<hr class="my-3">

<p><span class="fst-italic">Italic text</span></p>
<p><span class="fst-normal">Normal text</span></p>

<hr class="my-3">

<p class="text-decoration-underline">Underline</p>
<p class="text-decoration-line-through">Line through</p>

<hr class="my-3">

<p class="text-uppercase">uppercase</p>
<p class="text-lowercase">LOWERCASE</p>
<p class="text-capitalize">capitalize text</p>

</div>

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
crossorigin="anonymous"></script>

</html>
