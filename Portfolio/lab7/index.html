<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialNet Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="app-header text-center">
<h3>LBYCPG3 SocialNet - Profile Manager</h3>
</header>

<div class="container-fluid py-3">
<div class="row g-3">

<!-- LEFT -->
<div class="col-md-4">
<div class="panel">

<h6 class="panel-title">Profile Management</h6>

<div class="input-group mb-2">
<input id="input-name" class="form-control" placeholder="Enter full name">
<button id="btn-add" class="btn btn-primary">Add</button>
</div>

<div class="input-group mb-2">
<input id="input-search" class="form-control" placeholder="Search name">
<button id="btn-lookup" class="btn btn-outline-primary">Lookup</button>
</div>

<button id="btn-delete" class="btn btn-danger w-100 mb-3">
Delete Selected Profile
</button>

<div id="profile-list" class="list-group"></div>

</div>
</div>

<!-- CENTER -->
<div class="col-md-4">
<div class="panel text-center">

<h6 class="panel-title">Profile Information</h6>

<img id="profile-pic"
src="resources/images/default.png"
class="rounded-circle border border-primary mb-2"
width="96">

<h5 id="profile-name">No Profile Selected</h5>

<div id="profile-status" class="badge bg-primary mb-2">--</div>

<blockquote id="profile-quote" class="fst-italic">--</blockquote>

<h6>Friends</h6>
<div id="friends-list" class="list-group"></div>

</div>
</div>

<!-- RIGHT -->
<div class="col-md-4">
<div class="panel">

<h6 class="panel-title">Edit Profile</h6>

<!-- STATUS -->
<div class="input-group mb-3">
<input id="input-status" class="form-control" placeholder="New status">
<button id="btn-status" class="btn btn-primary">Update</button>
</div>

<!-- QUOTE -->
<div class="input-group mb-3">
<input id="input-quote" class="form-control" placeholder="Favorite quote">
<button id="btn-quote" class="btn btn-primary">Update</button>
</div>

<!-- PICTURE -->
<label class="small fw-semibold">Change Picture</label>

<input type="file" id="input-file" class="form-control mb-2" accept="image/*">

<input id="input-picture" class="form-control mb-2"
placeholder="Paste image URL">

<button id="btn-picture" class="btn btn-primary w-100 mb-3">
Update Picture
</button>

<!-- FRIENDS -->
<div class="input-group mb-3">
<input id="input-friend" class="form-control" placeholder="Friend name">
<button id="btn-add-friend" class="btn btn-success">Add</button>
</div>

<div class="input-group mb-3">
<input id="input-remove-friend" class="form-control" placeholder="Friend name">
<button id="btn-remove-friend" class="btn btn-warning">Remove</button>
</div>

</div>
</div>

</div>
</div>

<footer id="status-bar">
<span id="status-message">Ready.</span>
</footer>

<script src="js/app.js"></script>
</body>
</html>
