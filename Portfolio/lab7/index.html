<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialNet Manager</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/style.css">

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<header class="app-header text-center">
<h3>LBYCPG3 SocialNet App - Profile Manager</h3>
</header>

<div id="app-wrapper">

<main class="container-fluid py-3">
<div class="row g-3">

<!-- LEFT PANEL -->
<div class="col-md-4">
<div class="panel">

<h6 class="panel-title">Profile Management</h6>

<div class="input-group mb-2">
<input type="text" id="input-name" class="form-control" placeholder="Enter full name">
<button id="btn-add" class="btn btn-primary">Add</button>
</div>

<div class="input-group mb-2">
<input type="text" id="input-search" class="form-control" placeholder="Search name">
<button id="btn-lookup" class="btn btn-outline-primary">Look Up</button>
</div>

<button id="btn-delete" class="btn btn-danger w-100 mb-3">
Delete Selected Profile
</button>

<div id="profile-list" class="list-group"></div>

</div>
</div>

<!-- CENTER PANEL -->
<div class="col-md-4">
<div class="panel text-center">

<h6 class="panel-title">Profile Information</h6>

<img id="profile-pic"
src="resources/images/default.png"
class="rounded-circle border border-primary mb-2"
width="96">

<h5 id="profile-name">No Profile Selected</h5>

<div id="profile-status" class="badge bg-primary mb-2">--</div>

<blockquote id="profile-quote" class="fst-italic">
--
</blockquote>

<h6>Friends</h6>
<div id="friends-list" class="list-group"></div>

</div>
</div>

<!-- RIGHT PANEL -->
<div class="col-md-4">
<div class="panel">

<h6 class="panel-title">Edit Profile</h6>

<div class="input-group mb-3">
<input type="text" id="input-status" class="form-control" placeholder="New status">
<button id="btn-status" class="btn btn-primary">Change</button>
</div>

<div class="input-group mb-3">
<input type="text" id="input-picture" class="form-control" placeholder="Image path eg. resources\images\imagename.png">
<button id="btn-picture" class="btn btn-secondary">Update</button>
</div>

<div class="input-group mb-3">
<input type="text" id="input-friend" class="form-control" placeholder="Friend name">
<button id="btn-add-friend" class="btn btn-success">Add Friend</button>
</div>

<div class="input-group mb-3">
<input type="text" id="input-remove-friend" class="form-control" placeholder="Friend name">
<button id="btn-remove-friend" class="btn btn-warning">Remove</button>
</div>

</div>
</div>

</div>
</main>

<footer id="status-bar">
<span id="status-message">Ready.</span>
</footer>

</div>

<script src="js/app.js"></script>

</body>
</html>
