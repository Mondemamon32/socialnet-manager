<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Flexbox Justify Content</title>

<!-- LINK TO EXTERNAL CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="main-container">

<h1>CSS Flexbox Justify-Content</h1>

<div class="grid">

<!-- FLEX START -->
<div>
    <div class="label">flex-start</div>
    <div class="flex-box start">
        <div class="box yellow"></div>
        <div class="box pink"></div>
        <div class="box green"></div>
    </div>
</div>

<!-- SPACE AROUND -->
<div>
    <div class="label">space-around</div>
    <div class="flex-box around">
        <div class="box yellow"></div>
        <div class="box pink"></div>
        <div class="box green"></div>
    </div>
</div>

<!-- FLEX END -->
<div>
    <div class="label">flex-end</div>
    <div class="flex-box end">
        <div class="box yellow"></div>
        <div class="box pink"></div>
        <div class="box green"></div>
    </div>
</div>

<!-- SPACE BETWEEN -->
<div>
    <div class="label">space-between</div>
    <div class="flex-box between">
        <div class="box yellow"></div>
        <div class="box pink"></div>
        <div class="box green"></div>
    </div>
</div>

<!-- CENTER -->
<div>
    <div class="label">center</div>
    <div class="flex-box center">
        <div class="box yellow"></div>
        <div class="box pink"></div>
        <div class="box green"></div>
    </div>
</div>

<!-- SPACE EVENLY -->
<div>
    <div class="label">space-evenly</div>
    <div class="flex-box evenly">
        <div class="box yellow"></div>
        <div class="box pink"></div>
        <div class="box green"></div>
    </div>
</div>

</div>
</div>

</body>
</html>
